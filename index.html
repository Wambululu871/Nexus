<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0010; /* Deep ink from the original theme */
            --gold: #d0ab4d; /* Finesse Studio Gold */
            --white: #fdf4ff;
            --muted: rgba(253, 244, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Raleway', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Subtle Background Grain/Noise */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            opacity: 0.03;
        }

        main {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        .monogram {
            font-size: 0.7rem;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 2rem;
            display: block;
            opacity: 0;
            animation: fadeInDown 1.5s forwards;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 4rem;
            opacity: 0;
            animation: fadeIn 2s 0.5s forwards;
        }

        h1 em {
            font-style: italic;
            font-weight: 400;
            display: block;
            -webkit-text-stroke: 1px var(--white);
            color: transparent;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .portal-link {
            text-decoration: none;
            color: var(--muted);
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            padding: 10px;
            opacity: 0;
            animation: fadeInUp 1.2s forwards;
        }

        /* Staggered animation for links */
        .portal-link:nth-child(1) { animation-delay: 1.2s; }
        .portal-link:nth-child(2) { animation-delay: 1.4s; }
        .portal-link:nth-child(3) { animation-delay: 1.6s; }

        .portal-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background: var(--gold);
            transition: all 0.5s ease;
            transform: translateX(-50%);
        }

        .portal-link:hover {
            color: var(--white);
            letter-spacing: 0.5em;
        }

        .portal-link:hover::after {
            width: 40px;
        }

        /* High-end Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            h1 { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <main>
        <span class="monogram">Est. 2026</span>
        <h1>Our<em>Digital Estate</em></h1>


        <nav>
            <a href="https://myoneandonlyyy.vercel.app/" class="portal-link">The Independent</a>
            <a href="https://zetu-zetu.vercel.app/" class="portal-link">Shared Archive</a>
            <a href="https://your-sanctuary-143.vercel.app/" class="portal-link">The Sanctuary</a>
        </nav>   
    </main>

</body>
</html>
